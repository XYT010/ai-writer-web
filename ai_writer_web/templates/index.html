<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>AI写作助手</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
}

.container {
    margin-top: 60px;
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 16px;
    width: 500px;
    margin-left: auto;
    margin-right: auto;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0,255,255,0.2);
}

h1 {
    position: relative;
    font-size: 28px;
    cursor: pointer;
}

/* 🛸 小飞碟 */
.ufo {
    position: absolute;
    top: -40px;
    left: -80px;
    width: 40px;
    transition: all 0.8s ease;
}

/* 悬停触发 */
h1:hover .ufo {
    left: 120px;
    transform: rotate(20deg) scale(1.2);
}

/* 输入框 */
input, select {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    outline: none;
}

/* 按钮 */
button {
    padding: 10px 20px;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* 输出区域 */
.output {
    margin-top: 20px;
    text-align: left;
    white-space: pre-wrap;
    background: rgba(0,0,0,0.3);
    padding: 15px;
    border-radius: 10px;
}

/* 加载提示 */
#loadingText {
    display: none;
    color: #00eaff;
}
</style>
</head>

<body>

<div class="container">
    <h1>
        🤖 AI写作助手
        <img class="ufo" src="https://cdn-icons-png.flaticon.com/512/3212/3212608.png">
    </h1>

    <form method="post">
        <input type="text" name="topic" placeholder="输入文章主题" required>

        <select name="style">
            <option value="通俗易懂">通俗易懂</option>
            <option value="专业">专业</option>
        </select>

        <select name="length">
            <option value="短（300字）">短</option>
            <option value="中（600字）">中</option>
            <option value="长（1000字）">长</option>
        </select>

        <button type="submit" id="generateBtn">生成文章</button>

        <p id="loadingText">🚀 正在生成对应文章中…</p >
    </form>

    {% if article %}
    <div class="output">
        {{ article }}
    </div>

    <form action="/download" method="post">
        <textarea name="article" style="display:none;">{{ article }}</textarea>
        <button type="submit">⬇️ 下载文章</button>
    </form>
    {% endif %}
</div>

<script>
    const form = document.querySelector("form");
    const button = document.getElementById("generateBtn");
    const loadingText = document.getElementById("loadingText");

    form.addEventListener("submit", function() {
        button.disabled = true;
        button.innerText = "生成中...";
        loadingText.style.display = "block";
    });
</script>

</body>
</html>
